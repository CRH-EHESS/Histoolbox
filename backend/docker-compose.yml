services:
  api:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      # Persistance SQLite + fichiers OCR entre les redémarrages
      - ./data:/app/data
    expose:
      - "8001"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  caddy_data:
  caddy_config:
